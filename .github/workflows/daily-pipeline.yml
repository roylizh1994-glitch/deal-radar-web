name: Daily Deal Radar Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # 每天北京时间 08:00
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 1. 跑数据管道 ──────────────────────────────────────
      - name: Install pipeline dependencies
        run: npm install
        working-directory: pipeline

      - name: Run RSS pipeline
        run: npx tsx src/run-rss-pipeline.ts
        working-directory: pipeline
        env:
          DEAL_DATA_DIR: ${{ github.workspace }}/data

      # ── 2. 检查数据是否有变化 ──────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/homepage.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      # ── 3. 提交新数据 ──────────────────────────────────────
      - name: Commit updated deals
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "DealRadar Bot"
          git config user.email "bot@dealradar.app"
          git add data/homepage.json
          git commit -m "chore(data): update deals $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 4. 构建 + 部署到 Netlify ──────────────────────────
      - name: Install web dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm install

      - name: Build Next.js
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to Netlify
        if: steps.changes.outputs.changed == 'true'
        run: |
          npm install -g netlify-cli
          netlify deploy --dir=.next --prod \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site=${{ secrets.NETLIFY_SITE_ID }}
